<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Summit.blr — Bangalore Trail Network</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f5;--bg2:#fff;--surf:#f3f2ee;--surf2:#eae8e1;
  --ink:#0f0f0f;--ink2:#555;--ink3:#999;
  --bd:#e5e3dc;--bd2:#ccc9bf;
  --g:#15803d;--gbg:#dcfce7;--gl:#f0fdf4;
  --am:#b45309;--abg:#fef3c7;
  --rd:#dc2626;--rbg:#fee2e2;
  --pu:#6d28d9;--pbg:#ede9fe;
  --sans:'Space Grotesk',sans-serif;
  --body:'Inter',sans-serif;
  --r:8px;--rl:14px;--rxl:20px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--body);color:var(--ink)}
button{cursor:pointer;font-family:var(--body);border:none;background:none;outline:none}
input,textarea{font-family:var(--body);color:var(--ink);outline:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideR{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(150px) rotate(540deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes alertPulse{0%,100%{border-color:rgba(180,83,9,.35)}50%{border-color:rgba(180,83,9,.7)}}
@keyframes moodReveal{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.sp-word{font-family:var(--sans);font-size:clamp(30px,5vw,48px);font-weight:700;letter-spacing:-2px;color:var(--ink)}
.sp-word .dot{color:var(--g)}
.sp-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);font-weight:500}
.sp-bar{width:160px;height:2px;background:var(--bd);border-radius:99px;overflow:hidden}
.sp-fill{height:100%;background:var(--g);border-radius:99px;width:0;transition:width .25s ease}
.sp-msg{font-size:12px;color:var(--ink3);min-height:18px}

/* LAYOUT */
#app{position:fixed;inset:0;display:none;flex-direction:column}
#topbar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:50}
#body{flex:1;display:flex;overflow:hidden;position:relative}
#sidebar{width:336px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1);animation:slideR .25s ease}
#sidebar.off{width:0}
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}
#detail{width:310px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1);animation:slideL .25s ease}
#detail.off{width:0}

/* TOPBAR */
.tb-mark{width:28px;height:28px;background:var(--ink);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-mark svg{width:15px;height:15px;fill:#fff}
.tb-name{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:-.5px}
.tb-dot{color:var(--g)}
.tb-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.tb-btn{height:30px;padding:0 11px;border-radius:var(--r);font-size:12px;font-weight:500;border:1px solid var(--bd);color:var(--ink2);transition:all .15s}
.tb-btn:hover{background:var(--surf);color:var(--ink);border-color:var(--bd2)}
.tb-solid{background:var(--ink);color:#fff;border-color:transparent}
.tb-solid:hover{background:#222}
.tb-icon{width:30px;height:30px;border-radius:var(--r);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink3);transition:all .15s}
.tb-icon:hover{background:var(--surf);color:var(--ink)}
.tb-icon.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.u-pill{display:flex;align-items:center;gap:6px;padding:3px 10px 3px 5px;border-radius:99px;border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.u-pill:hover{border-color:var(--bd2);background:var(--surf)}

/* SIDEBAR TABS */
.sb-tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-tab{flex:1;padding:11px 3px;font-size:10px;font-weight:500;color:var(--ink3);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;cursor:pointer;text-align:center;letter-spacing:.01em}
.sb-tab:hover{color:var(--ink2)}
.sb-tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}
.sb-body{flex:1;overflow-y:auto;padding:12px}

/* WEATHER STRIP */
.wx{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);border:1px solid var(--bd);margin-bottom:12px;background:var(--bg2)}
.wx-name{font-size:12px;font-weight:600}
.wx-rec{font-size:11px;color:var(--ink3);margin-top:1px}
.wx-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;flex-shrink:0}

/* FILTER */
.frow{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.fc{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:500;border:1px solid var(--bd);color:var(--ink3);transition:all .15s;cursor:pointer;background:var(--bg2)}
.fc:hover{border-color:var(--bd2);color:var(--ink)}
.fc.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.fc.g{background:var(--gbg);color:#14532d;border-color:#86efac}
.fc.a{background:var(--abg);color:#78350f;border-color:#fde68a}
.fc.r{background:var(--rbg);color:#7f1d1d;border-color:#fca5a5}
.tcount{font-size:11px;color:var(--ink3);margin-bottom:8px;font-weight:500}

/* TREK CARD */
.tcard{border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);background:var(--bg2);margin-bottom:8px}
.tcard:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.05)}
.tcard.sel{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.tcard-img{height:96px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.tcard-img-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .3s ease}
.tcard:hover .tcard-img-inner{transform:scale(1.04)}
.tcard-emoji{font-size:44px;filter:drop-shadow(0 3px 12px rgba(0,0,0,.18));transition:transform .3s ease}
.tcard:hover .tcard-emoji{transform:translateY(-2px) scale(1.05)}
.tcard-diff{position:absolute;top:8px;left:8px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid}
.tcard-km{position:absolute;top:8px;right:8px;font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.88);color:var(--ink2);border:1px solid rgba(0,0,0,.06)}
.tcard-crowdbadges{position:absolute;bottom:7px;left:7px;right:7px;display:flex;gap:4px;flex-wrap:wrap}
.cbadge{font-size:9px;font-weight:600;padding:1px 7px;border-radius:99px;background:rgba(0,0,0,.45);color:#fff;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);white-space:nowrap}
.tcard-donebadge{position:absolute;bottom:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--g);border:2px solid #fff;display:flex;align-items:center;justify-content:center}
.tcard-donebadge::after{content:'';width:7px;height:4.5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(0,-1px)}
.tcard-body{padding:9px 11px}
.tcard-name{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:-.2px;color:var(--ink);margin-bottom:3px}
.tcard-meta{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
.tsep{width:2px;height:2px;border-radius:50%;background:var(--bd2)}
.ttag{margin-left:auto;font-size:9px;font-weight:500;padding:2px 6px;border-radius:99px;background:var(--surf);color:var(--ink3);border:1px solid var(--bd);flex-shrink:0}
.tcard-alert{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--abg);border-top:1px solid #fde68a;font-size:10px;font-weight:500;color:#78350f;animation:alertPulse 2.5s ease infinite}

/* MOOD MATCHER */
.mood-box{border-radius:var(--rl);border:1px solid var(--bd);overflow:hidden;margin-bottom:14px}
.mood-hd{padding:12px 14px;background:var(--ink);color:#fff}
.mood-title{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.mood-sub{font-size:11px;color:rgba(255,255,255,.5)}
.mood-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:12px}
.mood-opt{padding:10px 6px;border-radius:var(--r);border:1.5px solid var(--bd);text-align:center;cursor:pointer;transition:all .15s;background:var(--bg2)}
.mood-opt:hover{border-color:var(--bd2);background:var(--surf)}
.mood-opt.sel{border-width:2px}
.mood-icon{font-size:20px;display:block;margin-bottom:4px}
.mood-lbl{font-size:10px;font-weight:600;color:var(--ink)}
.mood-desc{font-size:9px;color:var(--ink3);margin-top:1px}
.mood-results{padding:0 12px 12px;animation:moodReveal .3s ease}
.mood-rlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:8px}
.mood-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;margin-bottom:5px;transition:all .15s;background:var(--bg2)}
.mood-item:hover{border-color:var(--bd2);transform:translateX(2px)}
.mood-item-icon{width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mood-item-name{font-size:12px;font-weight:600;color:var(--ink)}
.mood-item-why{font-size:10px;color:var(--ink3);margin-top:1px}

/* HEATMAP */
.heat-section{border-radius:var(--rl);border:1px solid var(--bd);overflow:hidden;margin-bottom:14px}
.heat-hd{padding:11px 13px;background:var(--ink);display:flex;align-items:center;justify-content:space-between}
.heat-title{font-family:var(--sans);font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 1.5s ease infinite}
.heat-item{padding:10px 13px;border-bottom:1px solid var(--bd);transition:background .12s;cursor:pointer}
.heat-item:last-child{border-bottom:none}
.heat-item:hover{background:var(--surf)}
.heat-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.heat-name{font-size:12px;font-weight:600;color:var(--ink)}
.heat-chips{display:flex;gap:4px}
.hchip{font-size:9px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid}
.heat-bars{display:flex;flex-direction:column;gap:4px}
.hbar-row{display:flex;align-items:center;gap:8px}
.hbar-lbl{font-size:10px;color:var(--ink3);width:62px;flex-shrink:0}
.hbar-track{flex:1;height:4px;background:var(--bd);border-radius:99px;overflow:hidden}
.hbar-fill{height:100%;border-radius:99px;transition:width .6s ease}
.hbar-val{font-size:10px;font-weight:600;width:26px;text-align:right;flex-shrink:0}
.ig-note{font-size:10px;color:var(--ink3);margin-top:6px;padding:3px 7px;border-radius:6px;background:var(--surf);display:inline-block;font-style:italic}

/* ALERTS */
.alert-item{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:var(--r);border:1px solid;margin-bottom:7px;animation:alertPulse 3s ease infinite}
.alert-sub-btn{padding:4px 11px;border-radius:99px;font-size:10px;font-weight:600;border:1px solid;transition:all .15s;margin-left:auto;flex-shrink:0;cursor:pointer}
.alert-sub-btn:hover{transform:scale(1.04)}

/* PHOTO WALL */
.pw-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.pw-item{border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);cursor:pointer;transition:all .18s;position:relative;aspect-ratio:1}
.pw-item:hover{transform:scale(1.03);border-color:var(--bd2)}
.pw-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;transition:transform .3s}
.pw-item:hover .pw-emoji{transform:scale(1.1)}
.pw-overlay{position:absolute;bottom:0;left:0;right:0;padding:5px 7px;background:linear-gradient(transparent,rgba(0,0,0,.55));color:#fff}
.pw-oname{font-size:10px;font-weight:600}
.pw-ouser{font-size:9px;opacity:.65}
.pw-upload{width:100%;padding:10px;border-radius:var(--r);border:1.5px dashed var(--bd2);font-size:12px;font-weight:500;color:var(--ink3);transition:all .15s;margin-bottom:10px}
.pw-upload:hover{border-color:var(--ink);color:var(--ink);background:var(--surf)}

/* DETAIL PANEL */
.dp-hero{height:148px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:default}
.dp-emoji{font-size:60px;filter:drop-shadow(0 4px 18px rgba(0,0,0,.22));transition:transform .35s ease;position:relative;z-index:1}
.dp-hero:hover .dp-emoji{transform:scale(1.07) translateY(-4px)}
.dp-hd{padding:13px 15px;border-bottom:1px solid var(--bd);flex-shrink:0}
.dp-name{font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:-.4px;color:var(--ink)}
.dp-tag{font-size:11px;color:var(--ink3);margin-top:2px}
.dp-close{width:27px;height:27px;border-radius:var(--r);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);transition:all .15s;flex-shrink:0}
.dp-close:hover{background:var(--surf);color:var(--ink)}
.dp-scroll{flex:1;overflow-y:auto;padding:13px 15px}
.dp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.dp-stat{background:var(--surf);border-radius:var(--r);padding:8px 5px;text-align:center}
.dp-stat-v{font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:-.2px;color:var(--ink)}
.dp-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-top:2px}
.dp-tabs{display:flex;background:var(--surf);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:12px}
.dp-tab{flex:1;padding:5px;border-radius:6px;font-size:11px;font-weight:500;text-align:center;color:var(--ink3);transition:all .15s;cursor:pointer}
.dp-tab.on{background:var(--bg2);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dp-feat{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--pbg);border-radius:var(--r);margin-bottom:10px}
.dp-feat-txt{font-size:11px;color:#4c1d95;font-weight:500}
.dp-desc{font-size:13px;color:var(--ink2);line-height:1.7}
.dp-mini-heat{background:var(--surf);border-radius:var(--r);padding:10px 12px;margin-bottom:10px}
.dp-mini-heat-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.gal-main{height:108px;border-radius:var(--r);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin-bottom:7px;overflow:hidden;background:var(--surf);position:relative;cursor:pointer;transition:all .2s}
.gal-main:hover{border-color:var(--bd2)}
.gal-emoji{font-size:52px;transition:transform .3s;filter:drop-shadow(0 3px 10px rgba(0,0,0,.12))}
.gal-main:hover .gal-emoji{transform:scale(1.09)}
.gal-cap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.42);color:#fff;font-size:10px;font-weight:500;padding:4px 9px;text-align:center;backdrop-filter:blur(2px)}
.gal-thumbs{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px}
.gal-thumb{width:38px;height:38px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--surf);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;cursor:pointer;transition:all .15s}
.gal-thumb.on{border-color:var(--ink);border-width:2px}
.gal-thumb:hover:not(.on){border-color:var(--bd2);transform:scale(1.07)}
.dp-footer{padding:11px 15px;border-top:1px solid var(--bd);flex-shrink:0}
.cta-log{width:100%;padding:10px;border-radius:var(--rl);font-size:13px;font-weight:600;background:var(--ink);color:#fff;transition:all .2s}
.cta-log:hover{background:#222;transform:translateY(-1px)}
.cta-done{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:var(--rl);background:var(--gl);font-size:13px;font-weight:600;color:#14532d;border:1px solid #86efac}
.cta-signin{text-align:center;padding:10px;border-radius:var(--rl);font-size:12px;color:var(--ink3);border:1.5px dashed var(--bd2)}

/* MODALS */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(15,15,15,.32);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rxl);overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.1);animation:scaleIn .2s ease}
.modal.sm{max-width:400px;width:calc(100% - 28px)}
.modal.md{max-width:460px;width:calc(100% - 28px);max-height:86vh;display:flex;flex-direction:column}
.m-stripe{height:3px}
.m-head{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.m-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:2px}
.m-title{font-family:var(--sans);font-size:17px;font-weight:700;letter-spacing:-.4px}
.m-x{width:27px;height:27px;border-radius:var(--r);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);transition:all .15s}
.m-x:hover{background:var(--surf);color:var(--ink)}
.m-body{padding:18px}
.m-scroll{overflow-y:auto;flex:1}
.seg{display:flex;background:var(--surf);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:12px}
.seg-btn{flex:1;padding:7px;border-radius:6px;font-size:12px;font-weight:500;color:var(--ink3);transition:all .15s;text-align:center;cursor:pointer}
.seg-btn.on{background:var(--bg2);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2);margin-bottom:4px}
.field input,.field textarea{width:100%;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rl);font-size:13px;background:var(--bg2);transition:border .15s;color:var(--ink)}
.field input:focus,.field textarea:focus{border-color:var(--ink)}
.field textarea{resize:none;line-height:1.5}
.demo-n{text-align:center;font-size:11px;color:var(--ink3);background:var(--surf);border-radius:var(--r);padding:6px;margin-bottom:10px}
.err{padding:7px 11px;border-radius:var(--r);background:var(--rbg);border:1px solid #fca5a5;font-size:12px;color:#7f1d1d;margin-bottom:10px}
.btn-p{width:100%;padding:10px;border-radius:var(--rl);font-size:13px;font-weight:600;background:var(--ink);color:#fff;transition:all .2s;margin-bottom:7px}
.btn-p:hover{background:#222}
.btn-gh{width:100%;text-align:center;font-size:12px;color:var(--ink3);padding:4px;transition:color .15s}
.btn-gh:hover{color:var(--ink)}
.file-area{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1.5px dashed var(--bd2);border-radius:var(--rl);cursor:pointer;margin-bottom:10px;transition:all .15s}
.file-area:hover{border-color:var(--ink);background:var(--surf)}
.mbtns{display:flex;gap:7px}
.m-cancel{flex:1;padding:9px;border-radius:var(--rl);font-size:12px;font-weight:500;border:1px solid var(--bd);color:var(--ink2);transition:all .15s}
.m-cancel:hover{background:var(--surf);color:var(--ink)}
.m-ok{flex:2;padding:9px;border-radius:var(--rl);font-size:13px;font-weight:600;color:#fff;transition:all .2s;border:none}
.m-ok:hover{transform:translateY(-1px)}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--bd);transition:background .12s}
.lb-row:hover{background:var(--surf)}
.lb-med{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ch-item{padding:12px 16px;border-bottom:1px solid var(--bd);transition:background .12s}
.ch-item:hover{background:var(--surf)}
.ch-iw{width:34px;height:34px;border-radius:var(--r);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ch-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid;flex-shrink:0}
.ch-bar{height:3px;background:var(--bd);border-radius:99px;overflow:hidden;margin:7px 0}
.ch-fill{height:100%;border-radius:99px;transition:width .5s ease}
.ch-claim{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;background:var(--abg);border:1px solid #fde68a;color:#78350f;transition:all .15s;margin-left:auto;cursor:pointer}
.ch-claim:hover{background:#fef9c3}
#burst{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:rgba(15,15,15,.45);backdrop-filter:blur(5px)}
.burst-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rxl);padding:30px 34px;text-align:center;max-width:300px;width:calc(100% - 28px);animation:scaleIn .3s ease}
.burst-icon{width:68px;height:68px;border-radius:50%;margin:0 auto 13px;display:flex;align-items:center;justify-content:center;font-size:32px}
.burst-title{font-family:var(--sans);font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:3px}
.burst-sub{font-size:13px;color:var(--ink3);margin-bottom:16px}
.burst-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:99px;background:var(--gbg);border:1px solid #86efac;font-family:var(--sans);font-size:16px;font-weight:700;color:#14532d}
#toasts{position:fixed;top:12px;right:12px;z-index:9000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{animation:toastIn .25s ease;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:9px 13px;display:flex;gap:8px;align-items:flex-start;max-width:250px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ti{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.tt{font-size:12px;font-weight:600}
.tm{font-size:11px;color:var(--ink3);margin-top:1px}
#credit{position:fixed;bottom:12px;left:14px;z-index:9999;display:flex;align-items:center;gap:5px}
#credit a{font-size:11px;font-weight:500;color:var(--ink3);text-decoration:none;transition:color .2s}
#credit a:hover{color:var(--g)}
/* LEAFLET */
.leaflet-popup-content-wrapper{border-radius:var(--rl)!important;border:1px solid var(--bd)!important;box-shadow:0 4px 20px rgba(0,0,0,.09)!important;padding:0!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip{background:var(--bg2)!important}
.trek-popup{padding:10px 13px;min-width:150px}
.trek-popup-name{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.2px;margin-bottom:2px}
.trek-popup-meta{font-size:11px;color:var(--ink3)}
.trek-popup-diff{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;margin-top:5px}
.tm-div{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:all .2s;font-size:15px}
.tm-div.big{width:40px;height:40px;font-size:18px;box-shadow:0 3px 14px rgba(0,0,0,.18)}
#mob-bar{display:none;position:absolute;bottom:0;left:0;right:0;z-index:50;background:rgba(249,248,245,.92);backdrop-filter:blur(12px);border-top:1px solid var(--bd);height:52px}
.mob-t{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--ink3);transition:color .15s;font-size:9px;font-weight:500;border-right:1px solid var(--bd)}
.mob-t:last-child{border-right:none}
.mob-t:hover{color:var(--ink)}
.mob-ti{font-size:18px;line-height:1}
@media(max-width:640px){#sidebar,#detail{display:none}#mob-bar{display:flex}}

/* DARK MODE */
body.dark {
  --bg:#111110;--bg2:#1a1917;--surf:#222220;--surf2:#2a2927;

  --am:#fbbf24;--abg:#78350f;
  --rd:#f87171;--rbg:#7f1d1d;
  --pu:#a78bfa;--pbg:#3b0764;
}
body.dark .leaflet-tile { filter: brightness(.85) invert(1) hue-rotate(180deg) saturate(.7); }

body.dark .tm-div { background:#1a1917 !important; }
#dark-toggle { transition: all .2s; }

/* SEARCH */
.search-wrap { position:relative; margin-bottom:10px; }
.search-input { width:100%; padding:8px 11px 8px 34px; border:1px solid var(--bd); border-radius:var(--r); font-size:13px; background:var(--bg2); color:var(--ink); transition:border .15s; }

.search-clear { position:absolute; right:9px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--ink3); cursor:pointer; padding:2px 5px; border-radius:4px; transition:all .15s; display:none; }
.search-clear:hover { color:var(--ink); background:var(--surf); }

function doneList(){return S.user?.done||[];}
function getWC(){const m=new Date().getMonth();if(m>=5&&m<=8)return WCS[Math.random()>.5?2:3];return WCS[Math.floor(Math.random()*2)];}
function wRec(wc,t){if(wc.label==="Heavy rain")return{ok:false,msg:"Unsafe"};if(wc.label==="Light rain"&&t.diff==="Hard")return{ok:false,msg:"Risky"};if(wc.label==="Foggy morning"&&t.diff==="Hard")return{ok:false,msg:"Low vis"};return{ok:true,msg:"Good to go"};}
function evalC(d,b){return CHALLENGES.map(c=>{let p=0;if(c.type==="count")p=Math.min(d.length,c.goal);else if(c.type==="diff")p=Math.min(d.filter(id=>TREKS.find(t=>t.id===id)?.diff===c.diff).length,c.goal);else if(c.type==="specific")p=d.includes(c.id2)?1:0;else if(c.type==="ids")p=Math.min(c.ids.filter(i=>d.includes(i)).length,c.goal);return{...c,prog:p,done:p>=c.goal,claimed:b?.includes(c.badge)};});}
function getBoard(){return Object.values(S.DB).map(u=>({name:u.name,done:u.done.length,badges:u.badges?.length||0})).sort((a,b)=>b.done-a.done);}
function toast(title,msg,icon,bg){bg=bg||"#dcfce7";const el=document.createElement("div");el.className="toast";el.innerHTML=`<div class="ti" style="background:${bg}">${icon||"✓"}</div><div><div class="tt">${title}</div>${msg?`<div class="tm">${msg}</div>`:""}</div>`;document.getElementById("toasts").appendChild(el);setTimeout(()=>el.remove(),4000);}
function cc(v){return v>=75?"#dc2626":v>=50?"#d97706":"#15803d";}
function cl(v){return v>=75?"Busy":v>=50?"Moderate":"Quiet";}
function sc(v){return v>=80?"#7c3aed":v>=60?"#2563eb":"#374151";}
function rc(v){return v>=25?"#dc2626":v>=15?"#d97706":"#15803d";}

// MAP
function initMap(){
  S.map=L.map("map",{zoomControl:false}).setView([13.0827,77.5877],10);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',subdomains:"abcd",maxZoom:19}).addTo(S.map);
  L.control.zoom({position:"bottomright"}).addTo(S.map);
  rebuildMarkers();
}

function rebuildMarkers(){
  Object.values(S.markers).forEach(m=>m.remove());S.markers={};
  const f=S.filter;
  TREKS.forEach(t=>{
    if(f!=="all"&&t.diff!==f)return;
    const isDone=doneList().includes(t.id),isSel=S.selId===t.id;
    const sz=isSel?40:34;
    const icon=L.divIcon({className:"",html:`<div class="tm-div${isSel?" big":""}" style="border-color:${t.dc};background:${isDone?t.dc:"#fff"};font-size:${isSel?18:15}px">${isDone?"✅":t.icon}</div>`,iconSize:[sz+6,sz+6],iconAnchor:[(sz+6)/2,(sz+6)/2],popupAnchor:[0,-(sz+6)/2]});
    const m=L.marker([t.lat,t.lng],{icon}).addTo(S.map);
    m.bindPopup(`<div class="trek-popup"><div class="trek-popup-name">${t.name}</div><div class="trek-popup-meta">${t.el} · ${t.dist} · ${t.km}km from BLR</div><span class="trek-popup-diff" style="background:${t.db};color:${t.dc};border:1px solid ${t.dc}30">${t.diff}</span></div>`,{closeButton:false,maxWidth:190});
    m.on("click",()=>{selectTrek(t.id);m.openPopup();});
    m.on("mouseover",()=>m.openPopup());
    S.markers[t.id]=m;
  });
}

function buildAuth(mode="login",err=""){
  return`<div class="modal sm"><div class="m-stripe" style="background:var(--g)"></div><div class="m-head"><div><div class="m-lbl">Summit.blr</div><div class="m-title">${mode==="login"?"Welcome back":"Join the trails"}</div></div><button class="m-x" onclick="closeModal()">✕</button></div><div class="m-body"><div class="seg"><button class="seg-btn${mode==="login"?" on":""}" onclick="swAuth('login')">Sign in</button><button class="seg-btn${mode==="signup"?" on":""}" onclick="swAuth('signup')">Create account</button></div>${mode==="signup"?`<div class="field"><label>Trail name</label><input id="a-name" placeholder="Your explorer name"></div>`:""}<div class="field"><label>Email</label><input id="a-email" type="email" placeholder="you@email.com"></div><div class="field"><label>Password</label><input id="a-pw" type="password" placeholder="6+ characters" onkeydown="if(event.key==='Enter')doAuth()"></div>${mode==="login"?`<div class="demo-n">Demo → arjun@demo.com / demo123</div>`:""} ${err?`<div class="err">${err}</div>`:""}<button class="btn-p" onclick="doAuth()">${mode==="login"?"Sign in →":"Create account →"}</button><button class="btn-gh" onclick="closeModal()">Cancel</button></div></div>`;
}
let _am="login";
function swAuth(m){_am=m;document.getElementById("modal-ov").innerHTML=buildAuth(m);}
function doAuth(){
  const email=document.getElementById("a-email")?.value?.trim(),pw=document.getElementById("a-pw")?.value,name=document.getElementById("a-name")?.value?.trim();
  if(!email||!pw){document.getElementById("modal-ov").innerHTML=buildAuth(_am,"Email and password required");return;}

  }else{const u=S.DB[email];if(!u||u.pw!==pw){document.getElementById("modal-ov").innerHTML=buildAuth(_am,"Wrong email or password");return;}S.user={...u};}
  delete S.user.pw;closeModal();onUC();toast(`Hey ${S.user.name.split(" ")[0]} 👋`,_am==="signup"?"Account created!":"Welcome back!","✓","#dcfce7");
}

// LOG TREK
let _lf=null;
function openLog(){if(!S.user||!S.selId)return;showModal("log");}
function buildLog(err=""){

}
function onF(i){_lf=i.files[0];const l=document.getElementById("f-lbl");if(l&&_lf)l.textContent="✓ "+_lf.name;}
function submitLog(){
  const note=document.getElementById("c-note")?.value?.trim();
  if(!note&&!_lf){document.getElementById("modal-ov").innerHTML=buildLog("Add a note or photo to verify");return;}
  const t=TREKS.find(x=>x.id===S.selId);if(!t||!S.user)return;
  const u=S.DB[S.user.email];if(!u)return;
  if(!u.done.includes(t.id))u.done.push(t.id);
  if(note)u.notes[t.id]=note;if(_lf)u.photos[t.id]=URL.createObjectURL(_lf);_lf=null;
  S.user={...u};delete S.user.pw;
  const cs=evalC(u.done,u.badges);cs.filter(c=>c.done&&!u.badges.includes(c.badge)).forEach(c=>{u.badges.push(c.badge);setTimeout(()=>toast("Badge earned!",c.badge,"🎖","#ede9fe"),1600);});
  closeModal();showBurst(t);onUC();renderDetail();
}
function buildPhotoUpload(){

let _puf=null;
function onPU(i){_puf=i.files[0];const l=document.getElementById("pu-lbl");if(l&&_puf)l.textContent="✓ "+_puf.name;}

  document.body.classList.toggle('dark');
  const btn=document.getElementById('dark-toggle');
  if(btn)btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
  localStorage.setItem('summit-dark',document.body.classList.contains('dark')?'1':'0');
}
(function(){if(localStorage.getItem('summit-dark')==='1'){document.body.classList.add('dark');const b=document.getElementById('dark-toggle');if(b)b.textContent='☀️';}})();

let _sq='';
function onSearch(v){
  _sq=v.trim().toLowerCase();
  const cl=document.getElementById('search-clear');
  if(cl)cl.style.display=_sq?'block':'none';
  if(S.tab==='trails')renderSB();
}
function clearSearch(){
  _sq='';
  const si=document.getElementById('sb-search');if(si)si.value='';
  const cl=document.getElementById('search-clear');if(cl)cl.style.display='none';
  if(S.tab==='trails')renderSB();
}
